    status: covered
    evidence: "passed as ?page= in the panel list call (e2e/admin_test.go)"
  - match: "orbit:github.com/jcsvwinston/orbit/datasource field:Query.PageSize"
    status: covered
    evidence: "passed as ?page_size= in the panel list call (e2e/admin_test.go)"
  - match: "orbit:github.com/jcsvwinston/orbit/datasource field:ModelInfo.Name"
    status: covered
    evidence: "asserted for Product and Order in /admin/api/models (e2e/admin_test.go)"
  - match: "orbit:github.com/jcsvwinston/orbit/datasource *"
    status: not-covered
    reason: "contract members that execute panel-internally or describe features the prototype's models do not use (choices, FK/index metadata, tenancy fields, search/filter flags, estimated counts); not asserted by the E2E"
