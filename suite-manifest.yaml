# suite-manifest.yaml — the honest coverage map of quantum-app against the
# certified Quantum set it pins.
#
# The DENOMINATOR is not defined here: it is generated from the inventories
# the suite repos already publish, read from the module cache at the exact
# tags in go.mod (see scripts/gen_suite_manifest.sh). Every denominator item
# must resolve to exactly one classification below; the CI gate
# (scripts/check_suite_manifest.sh) fails on unclassified items, on orphan
# classifications (talking about surfaces the pinned inventories no longer
# contain), on covered entries without evidence, and on pin drift.
#
# Matching: entries without '*' are exact item IDs and win over patterns;
# patterns use '*' as "any characters" and apply first-match-wins in file
# order — so specific rules go before catch-alls.
#
# Statuses:
#   covered      executed by this app with E2E/test evidence (pointer given)
#   not-covered  in reach of the prototype but not exercised (reason given)
#   out-of-scope deliberately outside the prototype (reason given)

suite: "1.8.0"
pins:
  quark: v1.3.3
  nucleus: v1.4.0
  orbit: v1.4.4

sources:
  quark: examples/superapp/apisurface.json (S7 surface manifest, 670 symbols)
  nucleus: docs/reference/API_CONTRACT_INVENTORY.md (public package table)
  orbit: contracts/baseline/api_exported_symbols.txt (frozen v1 surface)

notes: >
  The integration modules orbit/quarkbridge v0.3.4 and orbit/quarkdatasource
  v0.2.6 publish no machine-readable inventory at their tags, so they cannot
  enter the mechanical denominator; their execution is evidenced through the
  covered orbit/datasource and quark items below (the panel E2E drives Data
  Studio through quarkdatasource, and the live-feed E2E drives quarkbridge
  onto the nucleus event bus). orbit's fleet leg (agent/server/proto) is
  opt-in, not part of the in-process panel, and outside this prototype.

classifications:
  # ---- quark: surfaces this app calls directly (see evidence) -------------
  - match: "quark:github.com/jcsvwinston/quark.New"
    status: covered
    evidence: "cmd/quantum-app/main.go (pgx + mysql + replica-routed clients); every E2E boots through it"
  - match: "quark:github.com/jcsvwinston/quark.For"
    status: covered
    evidence: "internal/warehouse handlers; e2e/products_test.go, e2e/orders_test.go"
  - match: "quark:github.com/jcsvwinston/quark.WithMaxOpenConns"
    status: covered
    evidence: "cmd/quantum-app/main.go (pool sizing on all three clients)"
  - match: "quark:github.com/jcsvwinston/quark.WithReplicas"
    status: covered
    evidence: "cmd/quantum-app/main.go; e2e/replica_test.go (PostgreSQL streaming standby, pg_stat_replication asserted)"
  - match: "quark:github.com/jcsvwinston/quark.WithMiddleware"
    status: covered
    evidence: "internal/warehouse/module.go (quarkbridge middleware); e2e/admin_test.go TestOrbitLiveFeed"
  - match: "quark:github.com/jcsvwinston/quark.(*Client).Close"
    status: covered
    evidence: "cmd/quantum-app/main.go (deferred close of the three clients)"
  - match: "quark:github.com/jcsvwinston/quark.(*Client).RegisterModel"
    status: covered
    evidence: "internal/warehouse/module.go Migrate (PG and MySQL registries)"
  - match: "quark:github.com/jcsvwinston/quark.(*Client).MigrateRegistered"
    status: covered
    evidence: "internal/warehouse/module.go Migrate; schema exists on PG and MySQL in every E2E run"
  - match: "quark:github.com/jcsvwinston/quark.(*Client).WithOptions"
    status: covered
    evidence: "internal/warehouse/module.go OnStart (bridged client derivation)"
  - match: "quark:github.com/jcsvwinston/quark.(*Query[T]).Where"
    status: covered
    evidence: "internal/warehouse handlers; e2e/products_test.go, e2e/sessions_test.go"
  - match: "quark:github.com/jcsvwinston/quark.(*Query[T]).OrderBy"
    status: covered
    evidence: "internal/warehouse list handlers; e2e/products_test.go"
  - match: "quark:github.com/jcsvwinston/quark.(*Query[T]).List"
    status: covered
    evidence: "internal/warehouse list handlers; e2e/products_test.go, e2e/replica_test.go"
  - match: "quark:github.com/jcsvwinston/quark.(*Query[T]).First"
    status: covered
    evidence: "internal/warehouse/handlers_auth.go login; e2e/sessions_test.go"
  - match: "quark:github.com/jcsvwinston/quark.(*Query[T]).Find"
    status: covered
    evidence: "internal/warehouse get handlers; e2e/products_test.go, e2e/orders_test.go"
  - match: "quark:github.com/jcsvwinston/quark.(*Query[T]).Count"
    status: covered
    evidence: "internal/warehouse Migrate seed + inventory report; e2e/replica_test.go"
  - match: "quark:github.com/jcsvwinston/quark.(*Query[T]).Create"
    status: covered
    evidence: "internal/warehouse create paths on PG and MySQL; e2e/products_test.go (both engines asserted)"
  - match: "quark:github.com/jcsvwinston/quark.(*Query[T]).UpdateMap"
    status: covered
    evidence: "internal/warehouse update paths; e2e/products_test.go, e2e/orders_test.go (outbox hook confirm)"
  - match: "quark:github.com/jcsvwinston/quark.(*Query[T]).DeleteBy"
    status: covered
    evidence: "internal/warehouse/handlers_products.go delete; e2e/products_test.go"
  - match: "quark:github.com/jcsvwinston/quark.(*Query[T]).Limit"
    status: covered
