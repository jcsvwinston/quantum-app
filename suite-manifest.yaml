  - match: "quark:github.com/jcsvwinston/quark.(*Query[T]).Offset"
    status: covered
    evidence: "executed via quarkdatasource pagination; e2e/admin_test.go TestOrbitPanelDataStudio (panel list)"
  - match: "quark:github.com/jcsvwinston/quark.(*Query[T]).Delete"
    status: covered
    evidence: "executed via quarkdatasource; e2e/admin_test.go TestOrbitPanelDataStudio (panel delete)"
  - match: "quark:github.com/jcsvwinston/quark.(BeforeCreateHook).BeforeCreate"
    status: covered
    evidence: "internal/warehouse/models.go hooks run on every Create; e2e/products_test.go asserts created_at non-zero via the API for Product (PG) and StockMovement (MySQL)"
  - match: "quark:github.com/jcsvwinston/quark.GetModelMetaByType"
    status: covered
    evidence: "executed via quarkdatasource.Register at boot; e2e/admin_test.go (models listed in Data Studio)"

  # ---- quark: engines outside the prototype -------------------------------
  - match: "quark:*MSSQL*"
    status: out-of-scope
    reason: "MSSQL engine is outside this prototype (PostgreSQL + MySQL only); quark's own matrix covers it"
  - match: "quark:*Oracle*"
    status: out-of-scope
    reason: "Oracle engine is outside this prototype (PostgreSQL + MySQL only); quark's own matrix covers it"
  - match: "quark:*SQLite*"
    status: out-of-scope
    reason: "SQLite engine is outside this prototype (PostgreSQL + MySQL only); quark's own matrix covers it"
  - match: "quark:*MariaDB*"
    status: out-of-scope
    reason: "MariaDB engine is outside this prototype (PostgreSQL + MySQL only); quark's own matrix covers it"
  - match: "quark:github.com/jcsvwinston/quark.(*PostgresDialect).*"
    status: out-of-scope
    reason: "internal dialect methods: exercised transitively by every PG statement, not direct entry points (mirrors quark's own S7 allowlist)"
  - match: "quark:github.com/jcsvwinston/quark.(*MySQLDialect).*"
    status: out-of-scope
    reason: "internal dialect methods: exercised transitively by every MySQL statement, not direct entry points (mirrors quark's own S7 allowlist)"
  - match: "quark:github.com/jcsvwinston/quark.PostgreSQL"
    status: covered
    evidence: "dialect constructor selected by quark.New driver detection at boot (pgx clients)"
  - match: "quark:github.com/jcsvwinston/quark.MySQL"
    status: covered
    evidence: "dialect constructor selected by quark.New driver detection at boot (mysql client)"

  # ---- quark: subsystems outside the prototype ----------------------------
  - match: "quark:github.com/jcsvwinston/quark/quarktenant.*"
    status: out-of-scope
    reason: "multi-tenant routing: the warehouse prototype is single-tenant"
  - match: "quark:github.com/jcsvwinston/quark/otel.*"
    status: out-of-scope
    reason: "OpenTelemetry integration: the prototype stack ships no collector"
  - match: "quark:github.com/jcsvwinston/quark/cache/*"
    status: not-covered
    reason: "query caching is not exercised by the warehouse prototype"
  - match: "quark:github.com/jcsvwinston/quark/migrate.*"
    status: not-covered
    reason: "versioned migrations are not exercised: the prototype migrates schema-as-code (RegisterModel + MigrateRegistered)"
  - match: "quark:github.com/jcsvwinston/quark/quarkmigrate.*"
    status: not-covered
    reason: "versioned-migration CLI surface not exercised (schema-as-code path used instead)"

  # ---- quark: everything else ---------------------------------------------
  - match: "quark:*"
    status: not-covered
    reason: "not exercised by the warehouse prototype (callable surfaces), or not directly invocable (types, consts, vars, interface methods — the categories quark's own S7 allowlist classifies as non-entry-points)"

  # ---- nucleus: public packages the app executes --------------------------
  - match: "nucleus:pkg/nucleus"
    status: covered
    evidence: "cmd/quantum-app/main.go (builder, modules, Runtime, Router, EventBus); every E2E boots through it"
  - match: "nucleus:pkg/app"
    status: covered
    evidence: "config/e2e.yaml drives Config (databases aliases, session_store redis, storage s3, smtp, outbox); e2e suite boots the real app"
  - match: "nucleus:pkg/db"
    status: covered
    evidence: "framework-managed handles for the default (PG) and audit (MySQL) aliases; e2e/products_test.go asserts the audit-alias module"
  - match: "nucleus:pkg/router"
    status: covered
    evidence: "all warehouse routes and the orbit Mount run on it; every E2E request"
  - match: "nucleus:pkg/auth"
    status: covered
    evidence: "SessionManager (Redis store) + HashPassword/CheckPassword; e2e/sessions_test.go asserts the session key in Redis"
  - match: "nucleus:pkg/mail"
    status: covered
    evidence: "Sender.Send over real SMTP; e2e/orders_test.go asserts the message in Mailpit"
  - match: "nucleus:pkg/storage"
    status: covered
    evidence: "Store Put/Get/Delete against MinIO via the s3 provider; e2e/storage_test.go asserts the object in MinIO directly"
  - match: "nucleus:pkg/outbox"
    status: covered
    evidence: "NewStore + EnqueueTx in the order transaction; framework dispatcher + webhook bridge deliver; e2e/orders_test.go asserts row status and effect"
  - match: "nucleus:pkg/observability"
    status: covered
    evidence: "the event bus carries quarkbridge SQL to the orbit panel in-process; e2e/admin_test.go TestOrbitLiveFeed asserts events on the feed"
  - match: "nucleus:pkg/circuit"
    status: covered
    evidence: "default-enabled breakers wrap the mail and storage calls in e2e/orders_test.go and e2e/storage_test.go (pass-through path; trip/recovery not asserted)"
  - match: "nucleus:pkg/health"
    status: covered
    evidence: "scripts/e2e_run.sh readiness gate requires /healthz to answer 200 before the suite runs"

  # ---- nucleus: public packages the app does not exercise -----------------
  - match: "nucleus:pkg/model"
    status: not-covered
    reason: "the domain runs on the quark ORM; nucleus model.CRUD/registry is not consumed by this app (orbit uses the quarkdatasource override instead)"
  - match: "nucleus:pkg/authz"
    status: not-covered
    reason: "the app opts out of the default-deny enforcer (WithOpenAuthz) and guards mutations with its own session checks; only orbit's boot-time AddPolicy touches the enforcer"
  - match: "nucleus:pkg/plugins"
    status: not-covered
    reason: "no external plugin binaries in the prototype"
  - match: "nucleus:pkg/openapi"
    status: not-covered
    reason: "no OpenAPI document is mounted by the prototype"
  - match: "nucleus:pkg/tasks"
    status: not-covered
    reason: "no scheduled tasks in the prototype (background work goes through the outbox)"
  - match: "nucleus:pkg/observe"
    status: not-covered
    reason: "structured logging runs framework-internally; the app asserts nothing against it"
  - match: "nucleus:pkg/observability/hooks"
    status: not-covered
    reason: "observability hooks are not consumed by the app"
  - match: "nucleus:pkg/errors"
    status: not-covered
    reason: "the app returns its own JSON errors; the framework error helpers are not consumed directly"
  - match: "nucleus:pkg/validate"
    status: not-covered
    reason: "input validation is hand-rolled in the handlers; pkg/validate is not consumed"
  - match: "nucleus:pkg/signals"
    status: not-covered
    reason: "the signals bus is not consumed by the app"

  # ---- orbit: root module -------------------------------------------------
  - match: "orbit:github.com/jcsvwinston/orbit func:Module"
    status: covered
    evidence: "cmd/quantum-app/main.go mounts the panel; e2e/admin_test.go drives it over HTTP"
  - match: "orbit:github.com/jcsvwinston/orbit type:Config"
    status: covered
    evidence: "cmd/quantum-app/main.go builds it"
  - match: "orbit:github.com/jcsvwinston/orbit field:Config.Prefix"
    status: covered
    evidence: "set to /admin in main.go; all panel E2E URLs depend on it"
  - match: "orbit:github.com/jcsvwinston/orbit field:Config.Title"
    status: covered
    evidence: "set in main.go (panel heading)"
  - match: "orbit:github.com/jcsvwinston/orbit field:Config.DataSource"
    status: covered
    evidence: "quarkdatasource adapter injected in main.go; e2e/admin_test.go TestOrbitPanelDataStudio exercises Data Studio through it"
  - match: "orbit:github.com/jcsvwinston/orbit field:Config.BootstrapUsername"
    status: covered
    evidence: "set in main.go; e2e/admin_test.go logs into the panel with it"
  - match: "orbit:github.com/jcsvwinston/orbit field:Config.BootstrapEmail"
    status: covered
    evidence: "set in main.go (bootstrap admin provisioning)"
  - match: "orbit:github.com/jcsvwinston/orbit field:Config.BootstrapPassword"
    status: covered
