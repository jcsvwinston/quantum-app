  - match: "orbit:github.com/jcsvwinston/orbit field:Config.MultiTenant*"
    status: out-of-scope
    reason: "the warehouse prototype is single-tenant"
  - match: "orbit:github.com/jcsvwinston/orbit field:Config.Cluster*"
    status: not-covered
    reason: "single-node deployment: the in-process live feed needs no Redis relay (the relay is for multi-node fan-out)"
  - match: "orbit:github.com/jcsvwinston/orbit *"
    status: not-covered
    reason: "optional panel knobs left at their defaults by the prototype (auth database alias, environment label, migrations path, audit ring size, live excludes, trace URL template, DefaultPrefix constant)"

